<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edessa & Yahkub</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;500&family=Inter:wght@300&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #f8f8f6;
    color: #222;
}

/* HERO */
.hero {
    height: 100vh;
    position: relative;
    overflow: hidden;
}

.hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(70%);
}

/* OVERLAY */
.overlay {
    position: absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

/* TITLES */
h1 {
    font-family: 'Playfair Display', serif;
    font-size: 55px;
    letter-spacing: 5px;
    margin: 0;
}

.date {
    margin-top: 15px;
    font-size: 18px;
    letter-spacing: 3px;
}

/* COUNTDOWN PREMIUM */
.countdown {
    display: flex;
    gap: 15px;
    margin-top: 25px;
}

.time-box {
    border: 1px solid rgba(255,255,255,0.5);
    padding: 10px 15px;
    min-width: 70px;
}

.time-box span {
    display: block;
    font-size: 28px;
    font-weight: 500;
}

.time-box small {
    font-size: 10px;
    letter-spacing: 2px;
}

/* SECTION */
.section {
    padding: 80px 20px;
    max-width: 800px;
    margin: auto;
    text-align: center;
}

.box {
    border: 1px solid #ddd;
    padding: 25px;
    margin: 20px 0;
}

/* BUTTON */
button {
    padding: 12px 25px;
    border: none;
    background: black;
    color: white;
    cursor: pointer;
}

/* POPUP */
.popup {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
}

.popup-content {
    background:white;
    padding:30px;
    max-width:400px;
}

/* RSVP */
form input, form select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #ccc;
}
</style>
</head>

<body>

<div class="hero">
    <img src="IMG_9426.jpeg">

    <div class="overlay">
        <h1>EDESSA & YAHKUB</h1>
        <div class="date">06.06.2026</div>

        <div class="countdown">
            <div class="time-box">
                <span id="days">0</span>
                <small>TAGE</small>
            </div>
            <div class="time-box">
                <span id="hours">0</span>
                <small>STD</small>
            </div>
            <div class="time-box">
                <span id="minutes">0</span>
                <small>MIN</small>
            </div>
        </div>

    </div>
</div>

<div class="section">

    <div class="box">
        <h3>Kirchliche Trauung</h3>
        <p>17:00 Uhr</p>
        <button onclick="openPopup('trauung')">Details</button>
    </div>

    <div class="box">
        <h3>Hochzeitsfeier</h3>
        <p>19:00 Uhr</p>
        <button onclick="openPopup('feier')">Details</button>
    </div>

</div>

<div class="section">
    <h2>Rückmeldung</h2>

    <form id="rsvpForm">
        <input type="text" placeholder="Name" required>

        <select required>
            <option value="">Teilnahme</option>
            <option>Ich komme 🎉</option>
            <option>Ich komme nicht ❌</option>
        </select>

        <input type="number" placeholder="Anzahl Personen">

        <button type="submit">Absenden</button>
    </form>

</div>

<div class="popup" id="popup">
<div class="popup-content" id="popup-content"></div>
</div>

<script>

let targetDate = new Date("June 6, 2026 17:00:00").getTime();

setInterval(() => {
    let now = new Date().getTime();
    let diff = targetDate - now;

    let days = Math.floor(diff / (1000*60*60*24));
    let hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
    let minutes = Math.floor((diff % (1000*60*60)) / (1000*60));

    document.getElementById("days").innerText = days;
    document.getElementById("hours").innerText = hours;
    document.getElementById("minutes").innerText = minutes;

}, 1000);

function openPopup(type){
    let content = document.getElementById("popup-content");

    if(type==="trauung"){
        content.innerHTML = `
        <h2>Trauung</h2>
        <p>St. Jesaja<br>Zollstraße 11i<br>Gronau</p>
        <button onclick="closePopup()">Schließen</button>`;
    }

    if(type==="feier"){
        content.innerHTML = `
        <h2>Feier</h2>
        <p>Carte Blanche 99<br>Oldenzaal</p>
        <button onclick="closePopup()">Schließen</button>`;
    }

    document.getElementById("popup").style.display="flex";
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}

document.getElementById("rsvpForm").addEventListener("submit", function(e){
    e.preventDefault();
    alert("Danke für deine Rückmeldung ❤️");
});
</script>

</body>
</html>
